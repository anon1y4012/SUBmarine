# docker-compose.example.yml — copy to docker-compose.yml and run
# All credentials are configured on first launch via the setup wizard.
# No secrets belong in this file.

services:
  submarine:
    image: ghcr.io/anon1y4012/submarine:latest
    # Or build from source instead of pulling the image:
    # build: .
    container_name: submarine
    restart: unless-stopped
    ports:
      # Prefix with 127.0.0.1: for local-only access. See the README security note.
      - "5055:5000"        # Change left port if 5055 is taken
    volumes:
      - submarine-data:/data  # Persists config + DB between restarts
    environment:
      DB_PATH: /data/submarine.db
      SYNC_WORKERS: "8"       # Parallel TMDB threads. Raise to 16 for faster pings.
      # WEB_WORKERS: "2"      # Gunicorn worker processes.
      # LOG_LEVEL: INFO       # DEBUG, INFO, WARNING, or ERROR.
      # Existing installs: set this to enforce token auth after upgrade.
      # New installs mint a setup token automatically if this is omitted.
      # SUBMARINE_AUTH_TOKEN: "choose-a-long-random-token"

volumes:
  submarine-data:
